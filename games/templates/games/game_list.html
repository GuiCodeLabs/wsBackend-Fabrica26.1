<!DOCTYPE html>
<html>
<head>
    <title>Games</title>
</head>
<body>
    <a href="{% url 'games:search_games' %}">Buscar jogos</a>
    <a href="{% url 'games:create_game' %}">Criar novo jogo</a>

    <h1>Lista de Jogos</h1>

    {% for game in games %}
    <p>
        <a href="{% url 'games:game_detail' game.id %}">
            {{ game.title }}
        </a>
    </p>
    {% empty %}
        <p>Nenhum jogo cadastrado.</p>
    {% endfor %}

</body>
</html>
