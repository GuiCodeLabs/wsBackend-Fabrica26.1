<!DOCTYPE html>
<html>
<head>
    <title>Buscar Jogos</title>
</head>
<body>

<h1>Buscar Jogos</h1>

<form method="get">
    <input type="text" name="q" placeholder="Digite o nome do jogo">
    <button type="submit">Buscar</button>
</form>

<hr>

{% for game in games %}
    <div>
        <h3>{{ game.name }}</h3>

        {% if game.background_image %}
            <img src="{{ game.background_image }}" width="200">
        {% endif %}

        <p>Lançamento: {{ game.released }}</p>

        <form method="post" action="{% url 'games:save_api_game' %}">
            {% csrf_token %}
            <input type="hidden" name="title" value="{{ game.name }}">
            <input type="hidden" name="description" value="Jogo salvo pela API RAWG">
            <input type="hidden" name="image" value="{{ game.background_image }}">
            <input type="hidden" name="release_date" value="{{ game.released }}">
            <input type="hidden" name="api_id" value="{{ game.id }}">
            <button type="submit">Salvar na minha lista</button>
        </form>
    </div>
<hr>
{% empty %}
    <p>Nenhum resultado</p>
{% endfor %}

</body>
</html>
