services:
  web:
    build: .
    container_name: django_app
    # O command é herdado do Dockerfile (que usa o entrypoint.sh)
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    # Carrega as variáveis do arquivo .env para o container
    environment:
      - POSTGRES_DB=mygamelist_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: mygamelist_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: